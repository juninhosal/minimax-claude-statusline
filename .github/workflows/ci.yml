name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate Python syntax
        run: |
          python -m py_compile src/minimax_statusline/__init__.py
          python -m py_compile src/minimax_statusline/cli.py
          python -m py_compile src/minimax_statusline/check_usage.py
          python -m py_compile src/minimax_statusline/statusline.py

      - name: Validate imports
        run: |
          python -c "from minimax_statusline import cli, check_usage, statusline"

      - name: Validate CLI module
        run: |
          python -c "from minimax_statusline.cli import main; print('CLI module loaded successfully')"